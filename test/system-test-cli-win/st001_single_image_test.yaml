workflow:
  id: st001-single-image-test
  version: "1.0.0"
  description: >
    ST-001 minimal: LoadImage -> Denoise -> CellposeSegment -> RegionProps -> SaveData
    Tests the pipeline without MergeCollection to isolate the type compatibility issue.

  nodes:
    - id: load_image_1
      block_type: imaging.load_image
      config:
        params:
          path: "C:\\Users\\jiazh\\Desktop\\workspace\\Example\\images\\K562_L_2845 (uV).tif"

    - id: denoise
      block_type: imaging.denoise
      config:
        params:
          method: gaussian
          sigma: 1.0

    - id: cellpose_segment
      block_type: imaging.cellpose_segment
      config:
        params:
          model: cyto
          diameter: 30
          use_gpu: false

    - id: region_props
      block_type: imaging.region_props
      config:
        params:
          properties:
            - area
            - centroid
            - mean_intensity
            - bbox

    - id: save_table
      block_type: save_data
      config:
        params:
          core_type: DataFrame
          path: "C:\\Users\\jiazh\\Desktop\\workspace\\SciEasy\\test\\system-test-cli-win\\output_single.csv"

  edges:
    - source: "load_image_1:images"
      target: "denoise:image"
    - source: "denoise:image"
      target: "cellpose_segment:images"
    - source: "cellpose_segment:labels"
      target: "region_props:label"
    - source: "region_props:properties"
      target: "save_table:data"

  metadata:
    author: test-agent
    domain: imaging
    tags:
      - system-test
      - st-001-minimal
