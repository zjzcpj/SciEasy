[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "scieasy-blocks-srs"
version = "0.1.0.dev0"
description = "SciEasy SRS plugin — placeholder skeleton (Phase 11)."
requires-python = ">=3.11"
dependencies = [
    "scieasy>=0.2",
    "scieasy-blocks-imaging>=0.1.0.dev0",
]

[tool.setuptools.packages.find]
where = ["src"]
