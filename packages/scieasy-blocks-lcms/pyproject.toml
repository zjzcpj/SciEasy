[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "scieasy-blocks-lcms"
version = "0.1.0.dev0"
description = "SciEasy LC-MS plugin — placeholder skeleton (Phase 11)."
requires-python = ">=3.11"
dependencies = [
    "scieasy>=0.2.1",
]

[project.entry-points."scieasy.blocks"]
lcms = "scieasy_blocks_lcms:get_block_package"

[project.entry-points."scieasy.types"]
lcms = "scieasy_blocks_lcms:get_types"

[tool.setuptools.packages.find]
where = ["src"]
