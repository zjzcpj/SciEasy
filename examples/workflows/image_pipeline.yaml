# Image Processing Pipeline
#
# Demonstrates a 3-node image workflow:
#   1. Load microscopy images (TIFF)
#   2. Process each image via CodeBlock (e.g., background subtraction)
#   3. Export processed images
#
# This example shows CodeBlock with per-item processing via
# Block.map_items() — the ADR-020 Tier 2 pattern.
#
# Block types used: IOBlock, CodeBlock
# Data flow: Collection[Image] through each stage
#
# Usage:
#   scieasy validate examples/workflows/image_pipeline.yaml
#   scieasy run examples/workflows/image_pipeline.yaml  (requires P0 fixes)

workflow:
  id: image-pipeline
  version: "1.0.0"
  description: >
    Microscopy image processing pipeline. Loads TIFF images,
    applies background subtraction, and exports results.

  nodes:
    - id: load_images
      block_type: IOBlock
      config:
        direction: load
        path: data/raw/microscopy/
        format: tiff

    - id: background_subtract
      block_type: CodeBlock
      config:
        language: python
        mode: inline
        script: |
          # Background subtraction using rolling ball algorithm
          # inputs["images"] is a Collection[Image] from upstream
          from scieasy.blocks.base.block import Block

          def subtract_bg(image):
              # Placeholder: apply background subtraction
              return image

          output = Block.map_items(subtract_bg, inputs["images"])

    - id: export_images
      block_type: IOBlock
      config:
        direction: save
        path: data/processed/microscopy/
        format: tiff

  edges:
    - source: "load_images:output"
      target: "background_subtract:images"
    - source: "background_subtract:output"
      target: "export_images:input"

  metadata:
    author: SciEasy team
    domain: microscopy
    tags:
      - imaging
      - background-subtraction
