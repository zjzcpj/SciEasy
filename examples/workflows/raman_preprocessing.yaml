# Raman Spectroscopy Preprocessing Pipeline
#
# This workflow demonstrates a 4-node linear pipeline for Raman spectral data:
#   1. Load raw spectra from CSV files
#   2. Baseline correction via Python script (CodeBlock)
#   3. PCA dimensionality reduction via Python script (CodeBlock)
#   4. Export processed results to Parquet
#
# Block types used: IOBlock, CodeBlock
# Data flow: Collection[Series] through each stage
#
# Usage:
#   scieasy validate examples/workflows/raman_preprocessing.yaml
#   scieasy run examples/workflows/raman_preprocessing.yaml  (requires P0 fixes)

workflow:
  id: raman-preprocessing
  version: "1.0.0"
  description: >
    Raman spectroscopy preprocessing pipeline. Loads raw spectra,
    applies baseline correction, runs PCA, and exports results.

  nodes:
    - id: load_spectra
      block_type: IOBlock
      config:
        direction: load
        path: data/raw/raman_spectra.csv
        format: csv

    - id: baseline_correction
      block_type: CodeBlock
      config:
        language: python
        mode: inline
        script: |
          # Baseline correction using polynomial fitting
          # inputs["data"] is a Collection[Series] from upstream
          from scieasy.blocks.base.block import Block
          data = Block.unpack(inputs["data"])
          corrected = []
          for spectrum in data:
              # Placeholder: subtract linear baseline
              corrected.append(spectrum)
          output = Block.pack(corrected)

    - id: pca_reduction
      block_type: CodeBlock
      config:
        language: python
        mode: inline
        script: |
          # PCA dimensionality reduction
          # inputs["data"] is a Collection[Series] from baseline correction
          from scieasy.blocks.base.block import Block
          data = Block.unpack(inputs["data"])
          reduced = []
          for spectrum in data:
              # Placeholder: apply PCA transform
              reduced.append(spectrum)
          output = Block.pack(reduced)

    - id: export_results
      block_type: IOBlock
      config:
        direction: save
        path: data/processed/raman_pca.parquet
        format: parquet

  edges:
    - source: "load_spectra:output"
      target: "baseline_correction:data"
    - source: "baseline_correction:output"
      target: "pca_reduction:data"
    - source: "pca_reduction:output"
      target: "export_results:input"

  metadata:
    author: SciEasy team
    domain: spectroscopy
    tags:
      - raman
      - preprocessing
      - pca
