# Simple Merge Workflow
#
# Minimal example: two data sources merged into one output.
#   1. Load dataset A (CSV)
#   2. Load dataset B (CSV)
#   3. Merge into a single Collection
#
# This is the simplest multi-input workflow and is useful for
# verifying basic DAG execution and edge wiring.
#
# Block types used: IOBlock, MergeBlock
#
# Usage:
#   scieasy validate examples/workflows/simple_merge.yaml
#   scieasy run examples/workflows/simple_merge.yaml  (requires P0 fixes)

workflow:
  id: simple-merge
  version: "1.0.0"
  description: >
    Minimal merge workflow. Loads two datasets and merges them
    into a single Collection output.

  nodes:
    - id: load_a
      block_type: IOBlock
      config:
        direction: load
        path: data/input_a.csv
        format: csv

    - id: load_b
      block_type: IOBlock
      config:
        direction: load
        path: data/input_b.csv
        format: csv

    - id: merge
      block_type: MergeBlock
      config: {}

  edges:
    - source: "load_a:output"
      target: "merge:input_a"
    - source: "load_b:output"
      target: "merge:input_b"

  metadata:
    author: SciEasy team
    tags:
      - example
      - minimal
