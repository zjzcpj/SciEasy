name: Feature Request
description: Propose a new feature
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: How should this work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you considered
    validations:
      required: false
  - type: dropdown
    id: scope
    attributes:
      label: Affected Area
      options:
        - Core
        - Runtime
        - Storage
        - SDK
        - Plugin System
        - Frontend
        - API
        - CLI
        - AI
        - Other
    validations:
      required: true
