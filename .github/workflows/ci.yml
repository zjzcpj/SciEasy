name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: uv pip install --system ruff
      - run: ruff check .
      - run: ruff format --check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: uv pip install --system mypy
      - name: Run mypy
        run: |
          if [ -d packages ]; then
            mypy packages/ --ignore-missing-imports
          else
            echo "No packages/ directory yet — skipping"
          fi

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv pip install --system pytest
      - name: Run tests
        shell: bash {0}
        run: |
          pytest
          rc=$?
          if [ $rc -eq 5 ]; then
            echo "No tests collected — skipping"
            exit 0
          fi
          exit $rc

  import-lint:
    name: Import Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: uv pip install --system import-linter
      - name: Run import linter
        run: |
          if [ -d packages ]; then
            lint-imports
          else
            echo "No packages/ directory yet — skipping"
          fi
