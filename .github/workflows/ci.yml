name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv pip install --system ruff
      - run: ruff check .
      - run: ruff format --check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv pip install --system -e ".[dev]"
      - name: Run mypy
        run: |
          if [ -d src/scieasy ]; then
            mypy src/scieasy/ --ignore-missing-imports
          else
            echo "No src/scieasy/ directory yet — skipping"
          fi

  architecture:
    name: Architecture Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv pip install --system -e ".[dev]"
      - name: Run architecture tests
        run: pytest tests/architecture/ -v --no-cov

  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: [architecture]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv pip install --system -e ".[dev]"
      - name: Run tests
        shell: bash {0}
        run: |
          pytest
          rc=$?
          if [ $rc -eq 5 ]; then
            echo "No tests collected — skipping"
            exit 0
          fi
          exit $rc

  import-lint:
    name: Import Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv pip install --system -e ".[dev]"
      - name: Run import linter
        run: |
          if [ -d src/scieasy ]; then
            lint-imports
          else
            echo "No src/scieasy/ directory yet — skipping"
          fi

  # frontend:
  #   name: Frontend Build
  #   runs-on: ubuntu-latest
  #   # Not yet implemented — frontend/src/ does not exist.
  #   # Enable this job when frontend development begins.
  #   steps:
  #     - uses: actions/checkout@v6
  #     - uses: actions/setup-node@v4
  #       with:
  #         node-version: "20"
  #     - run: cd frontend && npm ci && npm run build

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Run frontend tests
        working-directory: frontend
        run: npm test
      - name: Build frontend
        working-directory: frontend
        run: npm run build
