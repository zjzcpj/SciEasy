name: CodeQL

on:
  push:
    branches: [main]
    paths:
      - "**.py"
  pull_request:
    branches: [main]
    paths:
      - "**.py"
  schedule:
    - cron: "0 6 * * 1"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [python]
    steps:
      - uses: actions/checkout@v6
      - name: Check for Python files
        id: check
        run: |
          if find . -name '*.py' -not -path './.git/*' | grep -q .; then
            echo "has_python=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_python=false" >> "$GITHUB_OUTPUT"
            echo "No Python files found — skipping analysis"
          fi
      - name: Skip — Python covered by default CodeQL setup
        run: echo "Python analysis is handled by GitHub's default CodeQL setup. Skipping advanced config to avoid conflict."
